<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>FasNapt Creator Profile</title>

<link rel="stylesheet"
href="profile.css">

</head>

<body>

<div class="profile-container">

<div class="profile-card">

<input
type="file"
id="profileUpload"
accept="image/*"
hidden>

<img
id="profileImage"
src="https://via.placeholder.com/180"
alt="Profile">

<button id="uploadBtn">
Upload Photo
</button>

<h1 id="username">
Farheen Taj
</h1>

<textarea
id="bio"
placeholder="Write your bio here..."></textarea>

<button id="saveBio">
Save Bio
</button>

<div class="stats">

<div>
<h2 id="followers">1200</h2>
<p>Followers</p>
</div>

<div>
<h2 id="following">450</h2>
<p>Following</p>
</div>

<div>
<h2 id="projects">15</h2>
<p>Projects</p>
</div>

</div>

<div class="badges">

<h2>🏆 Achievements</h2>

<span>🥉 Beginner</span>
<span>🥈 Rising</span>
<span>🥇 Pro</span>

</div>

<div class="social-links">

<h2>🌐 Social Links</h2>

<input
type="text"
id="github"
placeholder="GitHub URL">

<input
type="text"
id="linkedin"
placeholder="LinkedIn URL">

<button id="saveLinks">
Save Links
</button>

</div>

</div>

<div class="portfolio-section">

<h2>🚀 Portfolio Showcase</h2>

<div class="portfolio-grid">

<div class="project-card">
FasNapt AI Creator Studio
</div>

<div class="project-card">
QueryNest Search Engine
</div>

<div class="project-card">
Fyronix Analytics Dashboard
</div>

</div>

</div>

</div>

<script src="profile.js"></script>

</body>

</html>
