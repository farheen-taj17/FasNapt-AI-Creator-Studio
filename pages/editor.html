<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>FasNapt Video Editor</title>

<link rel="stylesheet" href="editor.css">

</head>

<body>

<div class="container">

<h1>🎬 FasNapt Video Editor</h1>

<input
type="file"
id="videoUpload"
accept="video/*">

<div class="video-area">

<video
id="videoPlayer"
controls>
</video>

<div id="textOverlay">
Sample Text
</div>

<div id="stickerOverlay">
🔥
</div>

</div>

<div class="controls">

<button id="rotateBtn">
Rotate
</button>

<button id="flipBtn">
Flip
</button>

<select id="speedControl">

<option value="0.5">0.5x</option>
<option value="1" selected>1x</option>
<option value="1.5">1.5x</option>
<option value="2">2x</option>

</select>

</div>

<div class="editor-tools">

<input
type="text"
id="textInput"
placeholder="Add Text">

<button id="addTextBtn">
Add Text
</button>

<select id="stickerSelect">

<option>🔥</option>
<option>🚀</option>
<option>🎯</option>
<option>❤️</option>
<option>⭐</option>

</select>

<button id="addStickerBtn">
Add Sticker
</button>

</div>

<div class="music-section">

<input
type="file"
id="musicUpload"
accept="audio/*">

<audio
id="musicPlayer"
controls>
</audio>

</div>

<div class="preset-section">

<button class="preset"
data-filter="none">

Normal

</button>

<button class="preset"
data-filter="cinematic">

Cinematic

</button>

<button class="preset"
data-filter="vibrant">

Vibrant

</button>

<button class="preset"
data-filter="retro">

Retro

</button>

</div>

</div>

<script src="editor.js"></script>

</body>

</html>
