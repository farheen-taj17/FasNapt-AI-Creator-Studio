<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>FasNapt Camera Studio</title>

<link rel="stylesheet" href="camera.css">

</head>

<body>

<div class="container">

<h1>📸 FasNapt Camera Studio</h1>

<div class="video-wrapper">

<video
id="video"
autoplay
playsinline>
</video>

</div>

<div class="controls">

<button id="startBtn">
Start Camera
</button>

<button id="stopBtn">
Stop Camera
</button>

<button id="captureBtn">
Capture Photo
</button>

<button id="recordBtn">
Start Recording
</button>

<button id="stopRecordBtn">
Stop Recording
</button>

<button id="mirrorBtn">
Mirror Mode
</button>

<button id="beautyBtn">
Beauty Filter
</button>

</div>

<div class="sliders">

<label>
Brightness
<input
type="range"
id="brightness"
min="50"
max="200"
value="100">
</label>

<label>
Contrast
<input
type="range"
id="contrast"
min="50"
max="200"
value="100">
</label>

<label>
Saturation
<input
type="range"
id="saturation"
min="50"
max="200"
value="100">
</label>

<label>
Zoom
<input
type="range"
id="zoom"
min="1"
max="2"
step="0.1"
value="1">
</label>

</div>

<canvas id="canvas"></canvas>

<img id="photoPreview">

<a
id="downloadPhoto"
style="display:none;">
Download Photo
</a>

<a
id="downloadVideo"
style="display:none;">
Download Video
</a>

</div>

<script src="camera.js"></script>

</body>

</html>
